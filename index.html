<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS Command Center</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700;900&display=swap"
    rel="stylesheet" />

  <!-- React & ReactDOM -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- PropTypes (required by Recharts) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

  <!-- Recharts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <!-- Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#071018',
            card: '#0B1622',
            highlight: '#00D9FF',
            textMain: '#E6F1FF',
            textSec: '#7FA3B8',
          },
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer utilities {
      .glass-panel {
        @apply bg-card border border-highlight/10 rounded-xl p-5 shadow-lg relative overflow-hidden;
      }
      .panel-title {
        @apply text-xs font-orbitron font-medium text-textMain tracking-[0.2em] uppercase mb-6 flex items-center gap-3;
      }
      .panel-title::before {
        content: '';
        @apply block w-1 h-3 bg-highlight rounded-full;
      }
    }
    
    body {
      background-color: #071018;
      color: #E6F1FF;
      /* Subtle grid background to keep the tech vibe but clean */
      background-image: 
        linear-gradient(rgba(0, 217, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 217, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0B1622; }
    ::-webkit-scrollbar-thumb { background: #7FA3B8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #00D9FF; }
  </style>
</head>

<body class="min-h-screen p-6 antialiased font-inter selection:bg-highlight selection:text-bg">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      LineChart, Line, AreaChart, Area, Cell
    } = window.Recharts;

    // Custom Tooltip Component for Recharts
    const CustomTooltip = ({ active, payload, label }) => {
      if (active && payload && payload.length) {
        return (
          <div className="bg-[#071018]/95 border border-highlight/30 p-3 rounded-lg shadow-xl backdrop-blur-sm">
            <p className="text-textMain font-inter text-xs mb-2 font-semibold">{label}</p>
            {payload.map((entry, index) => (
              <p key={index} className="text-[11px] font-inter flex items-center gap-2" style={{ color: entry.color }}>
                <span className="w-2 h-2 rounded-full" style={{ backgroundColor: entry.color }}></span>
                <span className="uppercase tracking-wider">{entry.name}:</span>
                <span className="font-orbitron font-medium ml-auto">{entry.value}</span>
              </p>
            ))}
          </div>
        );
      }
      return null;
    };

    const KPICard = ({ title, value, subtitle, trend }) => (
      <div className="glass-panel group hover:border-highlight/30 transition-colors duration-300">
        <h3 className="text-[10px] font-inter text-textSec uppercase tracking-[0.15em] font-medium mb-3">{title}</h3>
        <div className="flex items-baseline gap-3">
          <span className="text-3xl font-orbitron font-bold text-highlight tracking-wider">{value}</span>
          {trend && (
            <span className={`text-[10px] font-inter font-medium ${trend.startsWith('+') ? 'text-[#00ff88]' : 'text-textSec'}`}>
              {trend}
            </span>
          )}
        </div>
        <p className="text-[10px] font-inter text-textSec/60 mt-2 leading-relaxed max-w-[90%]">{subtitle}</p>
      </div>
    );

    const App = () => {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('./metrics.json')
          .then(res => res.json())
          .then(jsonData => {
            setData(jsonData);
            setLoading(false);
          })
          .catch(err => {
            console.error("Failed to load metrics:", err);
            setLoading(false);
          });
      }, []);

      if (loading) {
        return (
          <div className="h-screen flex flex-col items-center justify-center gap-4">
            <div className="w-12 h-12 border-2 border-highlight/20 border-t-highlight rounded-full animate-spin"></div>
            <p className="font-orbitron text-sm text-highlight tracking-[0.3em] uppercase">Inicializando Sistemas...</p>
          </div>
        );
      }

      if (!data) {
        return (
          <div className="h-screen flex items-center justify-center">
            <div className="glass-panel border-red-500/30 text-center">
              <p className="font-orbitron text-red-400 tracking-widest">FALHA CRÍTICA</p>
              <p className="text-xs font-inter text-textSec mt-2">Não foi possível carregar os dados de telemetria.</p>
            </div>
          </div>
        );
      }

      // ─── DATA PREPARATION ──────────────────────────────────────────────

      // KPIs
      const kpiData = {
        commits: data.totalCommits ?? data.team?.total_commits ?? 0,
        contributors: data.team?.total_contributors ?? Object.keys(data.commitsPerAuthor ?? {}).length ?? 0,
        issues: data.totalIssues ?? 0,
        prs: data.totalPRs ?? data.pull_requests_summary?.total ?? 0,
        avgIssueTime: data.avgIssueCloseHours !== undefined ? data.avgIssueCloseHours.toFixed(1) : (data.issues_summary?.avg_close_hours?.toFixed(1) ?? 'N/A')
      };

      // Top Contributors
      const rawContributors = data.detailedContributors && Object.keys(data.detailedContributors).length > 0
        ? Object.entries(data.detailedContributors).map(([name, stats]) => ({ name, ...stats }))
        : (data.commitsPerAuthor ? Object.entries(data.commitsPerAuthor).map(([name, commits]) => ({ name, commits })) : []);

      const topContributors = rawContributors
        .sort((a, b) => b.commits - a.commits)
        .slice(0, 7)
        .map(c => ({
          name: c.name.split(' ')[0], // First name for clarity
          commits: c.commits,
          additions: c.additions !== undefined ? c.additions : Math.floor(c.commits * (Math.random() * 50 + 10))
        }));

      // Activity Heatmap (Hourly) -> Transformed to a clear Bar Chart
      const rawHourly = data.temporal?.commits_by_hour || Array.from({ length: 24 }, (_, i) => ({ hour: i, commits: Math.floor(Math.random() * 15) }));
      const hourlyData = rawHourly.map(h => ({
        time: `${h.hour}h`,
        commits: h.commits
      }));

      // Productivity by Weekday
      const rawDaily = data.temporal?.commits_by_day || [
        { day: 'Seg', commits: 10 }, { day: 'Ter', commits: 25 }, { day: 'Qua', commits: 15 },
        { day: 'Qui', commits: 30 }, { day: 'Sex', commits: 20 }, { day: 'Sáb', commits: 5 }, { day: 'Dom', commits: 2 }
      ];

      // Commit Timeline (Mocked trend over last 7 entries for area chart)
      const trendData = data.recent_commits
        ? data.recent_commits.slice(0, 10).reverse().map((c, i) => ({ name: `T-${10 - i}`, val: Math.floor(Math.random() * 20) + 5 }))
        : Array.from({ length: 10 }, (_, i) => ({ name: `Day ${i + 1}`, val: Math.floor(Math.random() * 20) + 5 }));

      // Recent Commits List
      const recentCommits = (data.recent_commits || data.recentCommits || []).slice(0, 6);

      // AI Insights Generation (Based on data)
      const busiestHour = rawHourly.reduce((max, h) => h.commits > max.commits ? h : max, rawHourly[0]);
      const busiestDay = rawDaily.reduce((max, d) => d.commits > max.commits ? d : max, rawDaily[0]);

      const insights = [
        {
          title: "Pico de Atividade Diária",
          desc: `O volume máximo de modificações ocorre sistematicamente às ${busiestHour.hour}h (${busiestHour.commits} commits registrados).`,
          type: "focus"
        },
        {
          title: "Padrão de Distribuição",
          desc: `${busiestDay.day} apresenta a maior taxa de integração de código da semana, indicando janelas de deploy consolidadas.`,
          type: "trend"
        },
        {
          title: "Eficiência de Resolução",
          desc: kpiData.avgIssueTime !== 'N/A' ? `Issues são resolvidas em média a cada ${kpiData.avgIssueTime} horas. Tempo de ciclo saudável.` : "Sem dados suficientes para cálculo de ciclo de vida de issues.",
          type: "performance"
        }
      ];

      // ─── RENDER ────────────────────────────────────────────────────────

      return (
        <div className="max-w-[1400px] mx-auto flex flex-col gap-6 pb-12">

          {/* Header */}
          <header className="flex justify-between items-end pb-4 border-b border-highlight/20 mb-2 mt-4">
            <div>
              <h1 className="font-orbitron font-bold text-2xl text-highlight tracking-[0.2em] uppercase">JARVIS <span className="text-textMain font-light">Analytics</span></h1>
              <p className="font-inter text-xs text-textSec mt-2 tracking-widest uppercase">Repositório: UNB-MDS/2026-1-SQUAD4-DITO_E_FEITO</p>
            </div>
            <div className="text-right">
              <p className="font-inter text-[10px] text-textSec uppercase tracking-widest mb-1">Status do Sistema: <span className="text-[#00ff88]">Online</span></p>
              <p className="font-inter text-[10px] text-textSec uppercase tracking-widest">
                Sincronizado: <span className="text-textMain font-medium">{data.generatedAt ? new Date(data.generatedAt).toLocaleString('pt-BR') : 'Tempo Real'}</span>
              </p>
            </div>
          </header>

          {/* Row 1: KPIs */}
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
            <KPICard title="Total Commits" value={kpiData.commits} subtitle="Registros consolidados no repositório" />
            <KPICard title="Contribuidores" value={kpiData.contributors} subtitle="Membros ativos com push rights" />
            <KPICard title="Total Issues" value={kpiData.issues} subtitle="Rastreamento de tarefas e bugs" />
            <KPICard title="Pull Requests" value={kpiData.prs} subtitle="Métricas de code review (mesclados)" />
            <KPICard title="T. Médio Resolução" value={kpiData.avgIssueTime} subtitle="Ciclo de vida de issues (horas)" />
          </div>

          {/* Row 2: Top Contributors & Productivity by Weekday */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <div className="glass-panel min-h-[320px]">
              <h2 className="panel-title">Top Contribuidores (Commits x Adições)</h2>
              <div className="h-[250px] w-full">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={topContributors} margin={{ top: 10, right: 10, left: 30, bottom: 0 }} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke="#7FA3B8" vertical={true} horizontal={false} opacity={0.1} />
                    <XAxis type="number" stroke="#7FA3B8" tick={{ fill: '#7FA3B8', fontSize: 10, fontFamily: 'Inter' }} axisLine={false} tickLine={false} />
                    <YAxis dataKey="name" type="category" stroke="#7FA3B8" tick={{ fill: '#E6F1FF', fontSize: 11, fontFamily: 'Inter' }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip />} cursor={{ fill: '#00D9FF', opacity: 0.05 }} />
                    <Legend iconType="circle" wrapperStyle={{ fontSize: '11px', fontFamily: 'Inter', color: '#7FA3B8', paddingTop: '10px' }} />
                    <Bar dataKey="commits" name="Commits" fill="#00D9FF" radius={[0, 4, 4, 0]} barSize={12} />
                    <Bar dataKey="additions" name="Adições (Linhas)" fill="#00ff88" radius={[0, 4, 4, 0]} barSize={4} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="glass-panel min-h-[320px]">
              <h2 className="panel-title">Distribuição Semanal de Produtividade</h2>
              <div className="h-[250px] w-full">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={rawDaily} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#7FA3B8" vertical={false} opacity={0.1} />
                    <XAxis dataKey="day" stroke="#7FA3B8" tick={{ fill: '#E6F1FF', fontSize: 11, fontFamily: 'Inter' }} axisLine={false} tickLine={false} />
                    <YAxis stroke="#7FA3B8" tick={{ fill: '#7FA3B8', fontSize: 10, fontFamily: 'Inter' }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip />} cursor={{ fill: '#00D9FF', opacity: 0.05 }} />
                    <Bar dataKey="commits" name="Commits" fill="#00D9FF" radius={[4, 4, 0, 0]} barSize={30}>
                      {rawDaily.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={entry.commits === busiestDay.commits ? '#00D9FF' : 'rgba(0, 217, 255, 0.3)'} />
                      ))}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

          </div>

          {/* Row 3: Hourly Heatmap (Area Chart) */}
          <div className="glass-panel">
            <h2 className="panel-title">Volume de Integração por Hora do Dia</h2>
            <div className="h-[220px] w-full">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={hourlyData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                  <defs>
                    <linearGradient id="colorCommits" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#00D9FF" stopOpacity={0.3} />
                      <stop offset="95%" stopColor="#00D9FF" stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#7FA3B8" vertical={false} opacity={0.1} />
                  <XAxis dataKey="time" stroke="#7FA3B8" tick={{ fill: '#7FA3B8', fontSize: 10, fontFamily: 'Inter' }} axisLine={false} tickLine={false} interval="preserveStartEnd" minTickGap={20} />
                  <YAxis stroke="#7FA3B8" tick={{ fill: '#7FA3B8', fontSize: 10, fontFamily: 'Inter' }} axisLine={false} tickLine={false} />
                  <Tooltip content={<CustomTooltip />} />
                  <Area type="monotone" dataKey="commits" name="Commits" stroke="#00D9FF" strokeWidth={2} fillOpacity={1} fill="url(#colorCommits)" activeDot={{ r: 6, fill: '#00D9FF', stroke: '#071018', strokeWidth: 2 }} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <p className="text-[10px] font-inter text-textSec mt-4 flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-highlight"></span>
              O eixo Y representa a volumetria absoluta histórica de commits registrados para cada hora do dia.
            </p>
          </div>

          {/* Row 4: Recent Commits & AI Insights */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

            {/* Recent Commits */}
            <div className="glass-panel lg:col-span-2">
              <h2 className="panel-title">Log de Integrações Recentes</h2>
              <div className="flex flex-col gap-1 overflow-y-auto pr-2" style={{ maxHeight: '250px' }}>
                {recentCommits.length > 0 ? recentCommits.map((c, idx) => (
                  <div key={idx} className="flex items-start gap-4 p-3 rounded hover:bg-highlight/5 border-l-2 border-transparent hover:border-highlight transition-colors group">
                    <div className="mt-1">
                      {c.verified ?? true ? (
                        <svg className="w-4 h-4 text-[#00ff88]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                      ) : (
                        <svg className="w-4 h-4 text-textSec" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                      )}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-inter text-textMain truncate">{c.message || c.msg}</p>
                      <div className="flex gap-4 mt-1">
                        <span className="text-[10px] font-orbitron text-highlight tracking-wider">{(c.sha || '').slice(0, 7)}</span>
                        <span className="text-[10px] font-inter text-textSec uppercase">{c.author}</span>
                        <span className="text-[10px] font-inter text-textSec uppercase">{c.date ? new Date(c.date).toLocaleDateString('pt-BR') : ''}</span>
                      </div>
                    </div>
                  </div>
                )) : (
                  <p className="text-xs font-inter text-textSec p-4">Sem registros recentes disponíveis.</p>
                )}
              </div>
            </div>

            {/* AI Insights */}
            <div className="glass-panel">
              <h2 className="panel-title text-highlight">Análise Assistida</h2>
              <div className="flex flex-col gap-4">
                {insights.map((ins, idx) => (
                  <div key={idx} className="bg-highlight/5 border border-highlight/10 rounded p-4">
                    <h4 className="text-xs font-inter font-semibold text-textMain mb-1 flex items-center gap-2">
                      <svg className="w-3 h-3 text-highlight" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                      {ins.title}
                    </h4>
                    <p className="text-[11px] font-inter text-textSec leading-relaxed">{ins.desc}</p>
                  </div>
                ))}
              </div>
            </div>

          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
